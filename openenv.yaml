name: smart-retail-env
description: Smart Retail Intelligence Open Environment for retail sales prediction.

version: "1.0"

entrypoint: python inference.py

tasks:
  - id: easy
    description: Predict sales for a furniture chair order in South region with standard shipping.
    input:
      Category_Furniture: 1
      Category_Office Supplies: 0
      Category_Technology: 0
      Sub-Category_Bookcases: 0
      Sub-Category_Chairs: 1
      Sub-Category_Labels: 0
      Sub-Category_Tables: 0
      Sub-Category_Storage: 0
      Region_Central: 0
      Region_East: 0
      Region_South: 1
      Region_West: 0
      Ship Mode_First Class: 0
      Ship Mode_Same Day: 0
      Ship Mode_Second Class: 0
      Ship Mode_Standard Class: 1
    expected_output:
      predicted_sales: float

  - id: medium
    description: Predict sales for a technology storage order in West region with second class shipping.
    input:
      Category_Furniture: 0
      Category_Office Supplies: 0
      Category_Technology: 1
      Sub-Category_Bookcases: 0
      Sub-Category_Chairs: 0
      Sub-Category_Labels: 0
      Sub-Category_Tables: 0
      Sub-Category_Storage: 1
      Region_Central: 0
      Region_East: 0
      Region_South: 0
      Region_West: 1
      Ship Mode_First Class: 0
      Ship Mode_Same Day: 0
      Ship Mode_Second Class: 1
      Ship Mode_Standard Class: 0
    expected_output:
      predicted_sales: float

  - id: hard
    description: Predict sales for an office supplies labels order in East region with first class shipping.
    input:
      Category_Furniture: 0
      Category_Office Supplies: 1
      Category_Technology: 0
      Sub-Category_Bookcases: 0
      Sub-Category_Chairs: 0
      Sub-Category_Labels: 1
      Sub-Category_Tables: 0
      Sub-Category_Storage: 0
      Region_Central: 0
      Region_East: 1
      Region_South: 0
      Region_West: 0
      Ship Mode_First Class: 1
      Ship Mode_Same Day: 0
      Ship Mode_Second Class: 0
      Ship Mode_Standard Class: 0
    expected_output:
      predicted_sales: float